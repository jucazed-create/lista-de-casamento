<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Casamento</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#eaf6ff,#ffffff,#f5fbff);
}

header {
  background: linear-gradient(135deg,#89CFF0,#6bbbe8);
  color: white;
  padding: 35px 20px;
  text-align: center;
  box-shadow: 0 4px 15px rgba(0,0,0,.1);
}

  #contador{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
}
  
  .nomes{
  font-family: 'Great Vibes', cursive;
  font-size: 50px;
  margin: 0;
}

.frase{
  margin-top:10px;
  font-size:16px;
}
  
.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 16px;
  box-shadow: 0 6px 18px rgba(0,0,0,.08);
  text-align: center;
  padding-bottom: 15px;
  transition: transform .2s, box-shadow .2s;
}

  .card:hover{
  transform: translateY(-5px);
  box-shadow: 0 10px 25px rgba(0,0,0,.15);
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: contain;
}

.card h3 {
  margin: 10px 0 5px;
}

.card p {
  margin: 5px 0;
}

button {
  border: none;
  padding: 10px 14px;
  border-radius: 6px;
  cursor: pointer;
  margin: 6px;
  font-size: 14px;
}

.btn-presentear {
  background: linear-gradient(135deg,#89CFF0,#6bbbe8);
  color: white;
  font-weight: bold;
  transition: .2s;
}

  .btn-presentear:hover{
  transform: scale(1.05);
}

.btn-excluir {
  background: #ddd;
}

.presenteado {
  color: green;
  font-weight: bold;
}

/* FUNDO CORAÇÕES */

.hearts{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
  overflow:hidden;
  z-index:-1;
}

.heart{
  position:absolute;
  bottom:-50px;
  width:20px;
  height:20px;
  background:#89CFF0;
  transform: rotate(45deg);
  opacity:0.25;
  animation: subir linear infinite;
}

.heart::before,
.heart::after{
  content:"";
  position:absolute;
  width:20px;
  height:20px;
  background:#89CFF0;
  border-radius:50%;
}

.heart::before{
  top:-10px;
  left:0;
}

.heart::after{
  left:-10px;
  top:0;
}

@keyframes subir{
  0%{
    transform:translateY(0) rotate(45deg);
    opacity:0;
  }

  20%{
    opacity:0.25;
  }

  100%{
    transform:translateY(-110vh) rotate(45deg);
    opacity:0;
  }
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal-content {
  background: white;
  padding: 25px;
  border-radius: 14px;
  width: 90%;
  max-width: 400px;
  text-align: center;
}
</style>
</head>

<body>

<div class="hearts"></div>
  
<header>

<h1 class="nomes">Ismael & Isadora</h1>

<p class="frase">
Com amor Deus nos uniu, com amor criamos nosso lar 💕
</p>

<div id="contador"></div>

</header>

<div class="container">

  <!-- ADMIN -->
  <div id="adminArea" style="display:none;">
    <h2>Adicionar Item</h2>
    <input id="nome" placeholder="Nome do item"><br><br>
    <input id="valor" placeholder="Valor"><br><br>
    <input id="imagem" placeholder="URL da imagem"><br><br>
    <button onclick="adicionarItem()">Adicionar</button>
    <hr>
  </div>

  <div class="grid" id="lista"></div>

</div>

<!-- MODAL PIX -->
<div class="modal" id="modalPix">
  <div class="modal-content">
    <h3>Confirmar presente 🎁</h3>
    
    <p id="modalItem"></p>
    <p id="modalValor" style="font-weight:bold;"></p>
    
    <img id="pixQr" style="width:220px;margin:15px auto;display:block">

    <p>
      Chave Pix:<br>
      <strong id="pixChave"></strong>
    </p>

    <button class="btn-presentear" onclick="confirmarDoacao()">Já fiz o Pix ✅</button>
    <br>
    <button onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script>
/* CONFIG */
const PIX_CHAVE = "8597427285";
const PIX_QR = "qrcode-pix.jpg"; // coloque essa imagem no mesmo diretório

firebase.initializeApp({
  apiKey: "AIzaSyBAsRYLwsbpnIWHzIn9MgRJ_KEbfozMzBM",
  authDomain: "lista-casamento-ismael-isadora.firebaseapp.com",
  databaseURL: "https://lista-casamento-ismael-isadora-default-rtdb.firebaseio.com",
  projectId: "lista-casamento-ismael-isadora"
});

const db = firebase.database();
const lista = document.getElementById("lista");

/* ADMIN */
const isAdmin = window.location.search.includes("admin=1");
if (isAdmin) document.getElementById("adminArea").style.display = "block";

/* LISTAR ITENS */
db.ref("itens").on("value", snap => {
  lista.innerHTML = "";

  snap.forEach(child => {
    const item = child.val();
    const id = child.key;

    lista.innerHTML += `
      <div class="card">
        <img src="${item.imagem}">
        <h3>${item.nome}</h3>
        <p>R$ ${item.valor}</p>

        ${
          item.presenteado
            ? `<p class="presenteado">Presenteado ❤️</p>`
            : `<button class="btn-presentear" onclick="abrirModal('${id}','${item.nome}','${item.valor}')">
                Presentear
              </button>`
        }

        ${
          isAdmin
            ? `<button class="btn-excluir" onclick="excluirItem('${id}')">Excluir</button>`
            : ""
        }
      </div>
    `;
  });
});

  /* ANIMAÇÃO CORAÇÕES */

const heartsContainer = document.querySelector(".hearts");

function criarCoracao(){

  const heart = document.createElement("div");
  heart.classList.add("heart");

  heart.style.left = Math.random() * 100 + "vw";

  const size = Math.random()*15 + 10;
  heart.style.width = size + "px";
  heart.style.height = size + "px";

  heart.style.animationDuration = (Math.random()*6 + 6) + "s";

  heartsContainer.appendChild(heart);

  setTimeout(()=>{
    heart.remove();
  },12000);

}

setInterval(criarCoracao,800);

/* ADD */
function adicionarItem() {
  const nome = document.getElementById("nome").value;
  const valor = document.getElementById("valor").value;
  const imagem = document.getElementById("imagem").value;

  if (!nome || !valor || !imagem) {
    alert("Preencha todos os campos");
    return;
  }

  db.ref("itens").push({
    nome,
    valor,
    imagem,
    presenteado: false
  });

  document.getElementById("nome").value = "";
  document.getElementById("valor").value = "";
  document.getElementById("imagem").value = "";
}

/* EXCLUIR */
function excluirItem(id) {
  if (confirm("Excluir item?")) {
    db.ref("itens/" + id).remove();
  }
}

/* MODAL */
let itemSelecionado = null;

function abrirModal(id, nome, valor) {

  itemSelecionado = id;

  document.getElementById("modalItem").innerText = nome;
  document.getElementById("modalValor").innerText = "Valor: R$ " + valor;

  document.getElementById("pixQr").src = PIX_QR;
  document.getElementById("pixChave").innerText = PIX_CHAVE;

  document.getElementById("modalPix").style.display = "flex";
}
  
function fecharModal() {
  document.getElementById("modalPix").style.display = "none";
  itemSelecionado = null;
}

/* CONFIRMAR */
function confirmarDoacao() {
  if (!itemSelecionado) return;

  db.ref("itens/" + itemSelecionado).update({
    presenteado: true
  });

  window.location.href =
    "https://wa.me/558597427285?text=Acabei de presentear um item da lista 💍";
}

  /* CONTADOR CASAMENTO */

const dataCasamento = new Date("2026-06-06 15:00:00").getTime();

setInterval(function(){

  const agora = new Date().getTime();

  const distancia = dataCasamento - agora;

  const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
  const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
  const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

  document.getElementById("contador").innerHTML =
  "Faltam " + dias + " dias " + horas + "h " + minutos + "m " + segundos + "s 💍";

},1000);
  
</script>

</body>
</html>
